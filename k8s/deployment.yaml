apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api-service
  template:
    metadata:
      labels:
        app: api-service
    spec:
      containers:
      - name: api-service
        image: ai-dev-assistant/api-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: openai-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: llm-secrets
              key: claude-key
        - name: VECTOR_ENGINE_ADDR
          value: "vector-engine:50051"
        - name: QDRANT_ADDR
          value: "qdrant:6334"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vector-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vector-engine
  template:
    metadata:
      labels:
        app: vector-engine
    spec:
      containers:
      - name: vector-engine
        image: ai-dev-assistant/vector-engine:latest
        ports:
        - containerPort: 50051
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  selector:
    app: api-service
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: vector-engine
spec:
  selector:
    app: vector-engine
  ports:
  - port: 50051
    targetPort: 50051
